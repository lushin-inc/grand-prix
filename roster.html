<style>
  :root{
    --field:#0B1F3A; --field-2:#08182E; --panel:#102A4C; --panel-2:#0E2444;
    --line:rgba(255,255,255,.10); --line-strong:rgba(255,255,255,.18);
    --jersey:#FFFFFF; --ink:#0E2240; --ink-soft:#5B7193;
    --paper:#E9EFF8; --muted:#94AACB;
    --accent:#2EA6FF; --gold:#FFC53D; --good:#3DD68C; --bad:#FF6B6B;
    --att:#E5484D; --mid:#2F6FED; --def:#C13DA8; --lsm:#7C5CFC;
    --fo:#E8910C; --gk:#2FA968; --ps:#6B7280; --staff:#9FB2D0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #14315a 0%, transparent 60%),
      linear-gradient(180deg, var(--field) 0%, var(--field-2) 100%);
    color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 80px;}

  /* Header */
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;
    gap:14px;border-bottom:1px solid var(--line);padding-bottom:18px;}
  .brand{display:flex;flex-direction:column;gap:2px;}
  .brand .kicker{font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:.32em;
    text-transform:uppercase;font-size:11px;color:var(--accent);}
  .brand h1{font-family:"Anton",sans-serif;font-weight:400;letter-spacing:.02em;text-transform:uppercase;
    margin:0;line-height:.92;font-size:clamp(34px,7vw,56px);color:#fff;}
  .brand .sub{font-size:13px;color:var(--muted);margin-top:6px;}
  .brand .sub b{color:var(--paper);font-weight:600;}

  nav.tabs{display:flex;flex-wrap:wrap;gap:6px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:12px;padding:5px;}
  nav.tabs button{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
    font-size:13px;color:var(--muted);background:transparent;border:0;border-radius:8px;padding:9px 14px;
    cursor:pointer;transition:background .18s,color .18s;flex:1 1 auto;}
  nav.tabs button:hover{color:var(--paper);}
  nav.tabs button[aria-selected="true"]{background:var(--accent);color:#04223c;}

  /* Going scope toggle */
  .scope{display:flex;justify-content:center;margin:20px 0 4px;}
  .scope .seg{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:5px;gap:4px;}
  .scope button{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
    font-size:12.5px;color:var(--muted);background:transparent;border:0;border-radius:999px;
    padding:9px 18px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s,color .15s;}
  .scope button[aria-pressed="true"]{color:#04223c;background:var(--accent);}
  .scope button.going[aria-pressed="true"]{background:var(--gold);color:#3a2700;}
  .scope .cnt{font-size:11px;opacity:.7;font-weight:500;}

  .view{margin-top:18px;}
  .hidden{display:none !important;}

  /* Controls */
  .controls{display:flex;flex-wrap:wrap;gap:18px 28px;align-items:flex-start;margin-bottom:22px;}
  .ctl-group{display:flex;flex-direction:column;gap:8px;}
  .ctl-label{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.14em;
    font-size:10.5px;color:var(--muted);}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-family:"Oswald",sans-serif;font-weight:500;font-size:12.5px;letter-spacing:.04em;color:var(--paper);
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;
    transition:border-color .15s,background .15s,color .15s;text-transform:uppercase;white-space:nowrap;}
  .chip:hover{border-color:var(--line-strong);}
  .chip[aria-pressed="true"]{background:var(--accent);color:#04223c;border-color:var(--accent);}
  .chip .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}

  .section-title{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.16em;
    font-size:12px;color:var(--muted);margin:26px 0 12px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:"";flex:1;height:1px;background:var(--line);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px;}

  /* Jersey card */
  .card{position:relative;background:var(--jersey);border-radius:14px;padding:30px 14px 0;text-align:center;
    color:var(--ink);overflow:hidden;border-top:4px solid var(--ink-soft);
    box-shadow:0 1px 0 rgba(255,255,255,.04), 0 10px 24px -16px rgba(0,0,0,.7);}
  .card::before{content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%);
    width:46px;height:22px;border-radius:0 0 14px 14px;background:rgba(14,34,64,.06);}
  .card .going-badge{position:absolute;top:8px;right:8px;font-size:12px;line-height:1;background:var(--gold);
    color:#3a2700;border-radius:7px;padding:3px 6px;box-shadow:0 2px 6px -2px rgba(0,0,0,.4);}
  .card .name{font-family:"Anton",sans-serif;letter-spacing:.03em;text-transform:uppercase;font-size:24px;
    line-height:1.02;color:var(--ink);word-break:break-word;min-height:27px;}
  .card .num{font-family:"Anton",sans-serif;font-size:62px;line-height:1;color:var(--ink);margin:6px 0 2px;}
  .card .num.tbd{color:#C2CEDD;font-size:40px;line-height:1.4;}
  .pos-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin:8px 0 14px;}
  .pos{font-family:"Oswald",sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    color:#fff;border-radius:5px;padding:3px 8px;}
  .pos.tbd{background:#C2CEDD;color:#5B7193;}
  .card .parents{border-top:1px solid #EDF1F6;background:#F7F9FC;margin:0 -14px;padding:9px 12px;font-size:12px;
    color:var(--ink-soft);display:flex;align-items:center;gap:7px;justify-content:center;}
  .card .parents .pl{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
    font-size:9.5px;color:#A7B5C8;}
  .card .parents b{color:var(--ink);font-weight:600;}
  .card .parents.empty{color:#B7C2D1;}
  .card.coach{border-top-color:var(--staff);padding-bottom:18px;}
  .card.coach .role{font-family:"Oswald",sans-serif;font-weight:600;font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:#fff;background:#7C90AE;border-radius:5px;padding:4px 10px;display:inline-block;
    margin-top:10px;line-height:1.3;}

  /* Drills shared */
  .stage{max-width:560px;margin:0 auto;}
  .scopebar{display:flex;flex-wrap:wrap;gap:14px 24px;justify-content:center;margin-bottom:22px;}
  .flash{position:relative;width:100%;aspect-ratio:3/2;cursor:pointer;perspective:1400px;background:transparent;
    border:0;padding:0;display:block;}
  .flash-inner{position:relative;width:100%;height:100%;transition:transform .5s ease;transform-style:preserve-3d;}
  .flash.flipped .flash-inner{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:18px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
  .face.front{background:var(--jersey);color:var(--ink);box-shadow:0 18px 40px -22px rgba(0,0,0,.8);}
  .face.back{background:linear-gradient(160deg,#163a68,#0e2748);color:#fff;transform:rotateY(180deg);
    border:1px solid var(--line-strong);}
  .face .eyebrow{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.2em;
    font-size:11px;opacity:.7;margin-bottom:10px;}
  .face .big{font-family:"Anton",sans-serif;line-height:.98;text-transform:uppercase;font-size:clamp(40px,11vw,76px);}
  .face .big.small{font-size:clamp(26px,7vw,44px);}
  .face .answer-line{font-family:"Oswald",sans-serif;font-weight:500;font-size:16px;margin-top:8px;letter-spacing:.02em;}
  .face .answer-line .lab{color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:.1em;font-size:11px;margin-right:4px;}
  .face .pos-row{margin-top:14px;}
  .flip-hint{font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;opacity:.55;
    position:absolute;bottom:14px;left:0;right:0;text-align:center;}
  .deck-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 4px;}
  .deck-progress{font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:.08em;font-size:14px;color:var(--paper);}
  .deck-tally{display:flex;gap:14px;font-family:"Oswald",sans-serif;font-size:13px;letter-spacing:.04em;}
  .deck-tally .got{color:var(--good);} .deck-tally .miss{color:var(--bad);}
  .track{height:6px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden;margin-bottom:20px;}
  .track > span{display:block;height:100%;background:var(--accent);width:0;transition:width .3s ease;}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:13.5px;
    border-radius:10px;padding:13px 22px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--paper);
    transition:transform .08s,background .15s,border-color .15s;}
  .btn:hover{border-color:var(--line-strong);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--accent);color:#04223c;border-color:var(--accent);}
  .btn.good{background:var(--good);color:#06301f;border-color:var(--good);}
  .btn.miss{background:transparent;color:var(--bad);border-color:rgba(255,107,107,.5);}
  .btn.ghost{background:transparent;}
  .btn-row-sub{display:flex;gap:8px;justify-content:center;margin-top:12px;}
  .btn.tiny{font-size:11.5px;padding:8px 14px;}

  /* Quiz */
  .scoreboard{display:flex;justify-content:center;background:var(--panel-2);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .score-cell{flex:1;text-align:center;padding:12px 8px;border-right:1px solid var(--line);}
  .score-cell:last-child{border-right:0;}
  .score-cell .v{font-family:"Anton",sans-serif;font-size:30px;line-height:1;color:var(--gold);}
  .score-cell .v.accent{color:var(--accent);}
  .score-cell .k{font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
  .question{background:var(--jersey);color:var(--ink);border-radius:16px;padding:26px 22px;text-align:center;
    box-shadow:0 18px 40px -24px rgba(0,0,0,.8);}
  .question .qtype{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.18em;
    font-size:10.5px;color:var(--accent);margin-bottom:12px;}
  .question .q{font-family:"Oswald",sans-serif;font-weight:500;font-size:20px;line-height:1.3;}
  .question .q .qnum{font-family:"Anton",sans-serif;font-size:30px;vertical-align:-2px;margin:0 2px;}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:22px;}
  @media(max-width:480px){.options{grid-template-columns:1fr;}}
  .opt{font-family:"Oswald",sans-serif;font-weight:500;font-size:15px;letter-spacing:.02em;background:#fff;
    border:1.5px solid #DCE4EE;border-radius:11px;padding:14px 12px;cursor:pointer;color:var(--ink);
    transition:border-color .12s,background .12s;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;min-height:54px;}
  .opt .key{font-size:11px;color:#9AA8BC;border:1px solid #DCE4EE;border-radius:5px;padding:1px 6px;font-weight:600;}
  .opt:hover:not(:disabled){border-color:var(--accent);}
  .opt:disabled{cursor:default;}
  .opt.correct{background:#E7F9F0;border-color:var(--good);color:#0c6b43;}
  .opt.wrong{background:#FDECEC;border-color:var(--bad);color:#b3231f;}
  .opt.dim{opacity:.5;}
  .q-foot{display:flex;justify-content:center;margin-top:20px;min-height:48px;align-items:center;}

  .results{text-align:center;}
  .results .headline{font-family:"Anton",sans-serif;font-size:clamp(30px,8vw,52px);text-transform:uppercase;color:#fff;line-height:1;}
  .results .pct{font-family:"Anton",sans-serif;font-size:64px;color:var(--gold);line-height:1;margin:6px 0;}
  .results .blurb{font-family:"Oswald",sans-serif;font-weight:500;color:var(--paper);font-size:16px;margin-bottom:8px;}
  .miss-list{text-align:left;max-width:480px;margin:22px auto 0;display:flex;flex-direction:column;gap:8px;}
  .miss-list .mhead{font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.14em;
    font-size:11px;color:var(--bad);margin-bottom:2px;}
  .miss-item{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:8px;
    padding:11px 14px;font-size:14px;}
  .miss-item .mq{color:var(--muted);font-size:13px;} .miss-item .ma{color:var(--paper);font-weight:600;font-family:"Oswald",sans-serif;}
  .empty-note{font-family:"Oswald",sans-serif;font-weight:500;color:var(--muted);text-align:center;padding:30px;
    font-size:15px;letter-spacing:.02em;}

  /* Contacts */
  .csearch{display:flex;justify-content:center;margin-bottom:20px;}
  .csearch input{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:10px;
    color:var(--paper);font-size:15px;padding:12px 15px;font-family:inherit;}
  .csearch input::placeholder{color:var(--muted);}
  .csearch input:focus{outline:none;border-color:var(--accent);}
  .cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
  .contact-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px 8px;
    border-top:3px solid var(--ink-soft);}
  .contact-card.coach{border-top-color:var(--staff);}
  .contact-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);
    padding-bottom:10px;margin-bottom:12px;}
  .contact-head .cn{font-family:"Oswald",sans-serif;font-weight:600;font-size:17px;color:#fff;line-height:1.15;}
  .contact-head .cnum{font-family:"Oswald",sans-serif;font-weight:600;font-size:11.5px;color:var(--muted);
    letter-spacing:.05em;white-space:nowrap;text-transform:uppercase;}
  .cperson{margin-bottom:13px;}
  .cperson .crole{font-family:"Oswald",sans-serif;font-weight:700;font-size:10px;letter-spacing:.14em;
    color:var(--accent);text-transform:uppercase;}
  .cperson .cname{font-size:14.5px;color:var(--paper);font-weight:600;margin:1px 0 5px;}
  .cmeta{display:flex;flex-direction:column;gap:4px;}
  .cmeta a{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:8px;word-break:break-all;}
  .cmeta a:hover{color:var(--accent);}
  .cmeta .ic{width:15px;text-align:center;opacity:.85;flex:none;}
  .cnone{font-size:12.5px;color:#6f86a8;font-style:italic;}

  footer.foot{margin-top:40px;text-align:center;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:18px;}
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}.flash.flipped .flash-inner{transition:none;}}
  @media(max-width:520px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}nav.tabs{width:100%;}}
</style>

<style>
  .sitenav{position:sticky;top:0;z-index:200;background:rgba(14,16,19,.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}

  .sitenav-brand b{font-family:"Archivo Black",sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:#fff;}
  .sitenav-links{display:flex;gap:5px;}
  .sitenav-links a{font-family:"Archivo",sans-serif;font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:#C3C8D0;text-decoration:none;padding:7px 11px;border-radius:6px;transition:.15s;}
  .sitenav-links a:hover{background:rgba(225,6,0,.28);color:#fff;}
  .sitenav-links a.active{background:#E10600;color:#fff;}
  .sitenav-links a:focus-visible,.sitenav-brand:focus-visible{outline:3px solid #E10600;outline-offset:2px;}
  @media(max-width:760px){

  }
  @media(prefers-reduced-motion:reduce){.sitenav-links a{transition:none;}}
</style>

<body>
<nav class="sitenav">
  <div class="sitenav-inner">
    <a class="sitenav-brand" href="index.html"><span class="flag"></span><b>Grand Prix</b></a>
    <div class="sitenav-links">
      <a href="index.html#schedule">Schedule</a><a href="parking.html">Parking</a><a href="fields.html">Fields</a><a href="index.html#bracket">Bracket</a><a href="rules.html">Rules</a><a href="checklist.html">Checklist</a><a href="roster.html" class="active">Roster</a>
    </div>
  </div>
  <div class="sitenav-edge"></div>
</nav>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <span class="kicker">True Indiana 2033 White</span>
      <h1>Team Roster</h1>
      <div class="sub" id="headSub"></div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Sections">
      <button role="tab" id="tab-reference" aria-selected="true" data-tab="reference">Reference</button>
      <button role="tab" id="tab-flash" aria-selected="false" data-tab="flash">Flashcards</button>
      <button role="tab" id="tab-quiz" aria-selected="false" data-tab="quiz">Quiz</button>
      <button role="tab" id="tab-contacts" aria-selected="false" data-tab="contacts">Contacts</button>
    </nav>
  </header>

  <div class="scope">
    <div class="seg" role="group" aria-label="Roster scope">
      <button id="scopeAll" aria-pressed="true">Full Roster</button>
      <button id="scopeGoing" class="going" aria-pressed="false">🏁 Grand Prix <span class="cnt" id="goingCnt"></span></button>
    </div>
  </div>

  <!-- REFERENCE -->
  <section class="view" id="view-reference" role="tabpanel" aria-labelledby="tab-reference">
    <div class="controls">
      <div class="ctl-group">
        <span class="ctl-label">Sort by</span>
        <div class="chips" id="sortChips">
          <button class="chip" data-sort="num" aria-pressed="true">Number</button>
          <button class="chip" data-sort="pos" aria-pressed="false">Position</button>
          <button class="chip" data-sort="name" aria-pressed="false">Name</button>
        </div>
      </div>
      <div class="ctl-group">
        <span class="ctl-label">Filter position</span>
        <div class="chips" id="filterChips"></div>
      </div>
    </div>
    <div id="rosterArea"></div>
  </section>

  <!-- FLASHCARDS -->

<script>
/* ---------------- DATA ---------------- */
const POS = {

/* going:true = on the roster for THIS tournament (NXT Grand Prix, Jul 18-19 2026).

  {first:'Lewis',   last:'Weaver',            num:6,  pos:['Attack','Midfield'],  tag:'Player', going:true ,  mom:{name:'Ashley Weaver', email:'ashleyweaver11@gmail.com', phone:'3144886945'}, dad:null},

  {first:'Maverick',last:'Devylder',          num:10, pos:['Attack'],             tag:'Player', going:true ,  mom:{name:'Summer Devylder', email:'summerdevylder@gmail.com', phone:'7653668441'}, dad:{name:'Jameson Devylder', email:'devylderfamily5@gmail.com', phone:'3177641016'}},
  {first:'James',   last:'Faber',             num:11, pos:['Goalie'],             tag:'Player', going:true ,  mom:{name:'Kailey Faber', email:'kailey.k.faber@gmail.com', phone:'6158789959'}, dad:{name:'Dan Faber', email:'dan@lushin.com', phone:'6157883211'}},

  {first:'Knox',    last:'Nichols',           num:26, pos:['Midfield','Faceoff'], tag:'Player', going:true , mom:null, dad:{name:'Scott Nichols', email:'scotty5cents@gmail.com', phone:'3176976535'}},
  {first:'Dessi',   last:'Fitzpatrick',       num:33, pos:['Midfield'],           tag:'Player', going:true ,  mom:{name:'Sarah Fitzpatrick', email:'sissyfitz@gmail.com'}, dad:{name:'Pat Fitzpatrick', email:'pfitz33@gmail.com', phone:'9739326504'}},
  {first:'Noah',    last:'Delello',           num:44, pos:['Attack'],             tag:'Player', going:false,  mom:{name:'Melissa Delello', email:'melissamdelello@gmail.com', phone:'3174006741'}, dad:null},
  {first:'Noah',    last:'Gottlieb',          num:62, pos:['Practice Squad'],     tag:'Player', going:true ,  mom:{name:'Sarah Gottlieb', email:'sarah_gottlieb@comcast.net', phone:'3173314987'}, dad:null},
  {first:'Zachary', last:'Efinger-Yarbrough', num:1,  pos:['Defense','LSM'],      tag:'Player', going:true ,  mom:{name:'Lindsey Yarbrough', email:'lindzaaron@gmail.com', phone:'3176007377'}, dad:null},
  {first:'John Wayne', last:'Turner',         num:null, pos:['Defense'],          tag:'Player', going:true , mom:null, dad:{name:'Travis Turner', email:'travist323@gmail.com', phone:'3173537400'}},
  {first:'Mason',   last:'Hollander',         num:null, pos:[],                   tag:'Player', going:true , mom:{name:'Jenny Hollander', email:'jmarie.hollander@gmail.com', phone:'8125496103'}, dad:null},

  {first:'Josh', last:'Devylder',  num:null, pos:['Head Coach'],     tag:'Coach', going:true,  contact:{email:'joshdevylder@gmail.com', phone:'3177641016'}},
  {first:'Doug', last:'Crawford',  num:null, pos:['Director'],       tag:'Coach', going:true,  contact:{email:'dcrawford@truelacrosse.com', phone:'9205018368'}},
  {first:'Zac',  last:'Reid',      num:null, pos:['Team Owner / Senior Director'], tag:'Coach', going:true, contact:{email:'zreid@truelacrosse.com', phone:'9052469515'}},
  {first:'Colin',last:'Stevens',   num:null, pos:['Assistant Coach'],tag:'Coach', going:false, contact:{email:'colinstevens33@gmail.com', phone:'3176463451'}},
  {first:'Chris',last:'Berju',     num:null, pos:['Director of Youth Development'], tag:'Coach', going:false, contact:null}
];

const PLAYERS = ROSTER.filter(p=>p.tag==='Player');
const COACHES = ROSTER.filter(p=>p.tag==='Coach');

/* ---------------- HELPERS ---------------- */
// First-name identity; add a last initial only when two players share a first name (Mason H/C, Noah D/G).
(function computeDisplay(){
  const counts={};
  PLAYERS.forEach(p=>counts[p.first]=(counts[p.first]||0)+1);
  ROSTER.forEach(p=>{ p.disp = (p.tag==='Player' && counts[p.first]>1) ? `${p.first} ${p.last[0]}.` : p.first; });
})();
const fullName = p => p.disp;
const realName = p => `${p.first} ${p.last}`;
const posLabel = p => p.pos.length ? p.pos.join(' / ') : '—';

function parents(p){
  const out=[];
  if(p.mom) out.push(Object.assign({lab:'Mom', first:p.mom.name.split(' ')[0]}, p.mom));
  if(p.dad) out.push(Object.assign({lab:'Dad', first:p.dad.name.split(' ')[0]}, p.dad));
  return out;
}
function posChips(p){
  if(!p.pos.length) return `<span class="pos tbd">TBD</span>`;
  return p.pos.map(name=>{ const m=POS[name];
    return m ? `<span class="pos" style="background:${m.color}">${m.abbr}</span>`
             : `<span class="pos" style="background:#7C90AE">${name}</span>`; }).join('');
}
const primaryColor = p => (POS[p.pos[0]]||{}).color || 'var(--staff)';
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function sample(pool,n,ex){return shuffle(pool.filter(x=>x!==ex)).slice(0,n);}
function fmtPhone(d){if(!d)return'';const s=(''+d).replace(/\D/g,'');return s.length===10?`(${s.slice(0,3)}) ${s.slice(3,6)}-${s.slice(6)}`:d;}
function telHref(d){const s=(''+d).replace(/\D/g,'');return s.length===10?'+1'+s:s;}

/* ---------------- SCOPE (Full vs Grand Prix) ---------------- */
let goingOnly=false;
const inScope = p => !goingOnly || p.going;
const scopedPlayers = () => PLAYERS.filter(inScope);
const scopedCoaches = () => COACHES.filter(inScope);
const numberedScoped = () => scopedPlayers().filter(p=>p.num!=null);

const playersGoing = PLAYERS.filter(p=>p.going).length;
const staffGoing   = COACHES.filter(p=>p.going).length;
const numberedAll = PLAYERS.filter(p=>p.num!=null).length;

function updateHeader(){
  const sub=document.getElementById('headSub');
  sub.innerHTML = goingOnly
    ? `<b>${playersGoing}</b> players + <b>${staffGoing}</b> staff &nbsp;·&nbsp; 🏁 going to the Grand Prix`
    : `<b>${PLAYERS.length}</b> players &nbsp;·&nbsp; <b>${numberedAll}</b> numbered &nbsp;·&nbsp; <b>${COACHES.length}</b> staff`;
}
document.getElementById('goingCnt').textContent = `(${playersGoing})`;

function activeTab(){return document.querySelector('nav.tabs button[aria-selected="true"]').dataset.tab;}
function renderActive(){
  const t=activeTab();
  if(t==='reference') renderRoster();
  else if(t==='flash') buildDeck();
  else if(t==='quiz') resetQuiz();
  else if(t==='contacts') renderContacts(document.getElementById('contactSearch').value);
}
function setScope(g){
  goingOnly=g;
  document.getElementById('scopeAll').setAttribute('aria-pressed', g?'false':'true');
  document.getElementById('scopeGoing').setAttribute('aria-pressed', g?'true':'false');
  updateHeader(); renderActive();
}
document.getElementById('scopeAll').onclick=()=>setScope(false);
document.getElementById('scopeGoing').onclick=()=>setScope(true);

/* ---------------- TABS ---------------- */
const tabs=document.querySelectorAll('nav.tabs button');
tabs.forEach(t=>t.addEventListener('click',()=>{
  tabs.forEach(x=>x.setAttribute('aria-selected', x===t?'true':'false'));
  ['reference','flash','quiz','contacts'].forEach(v=>{
    document.getElementById('view-'+v).classList.toggle('hidden', v!==t.dataset.tab);
  });
  if(t.dataset.tab==='flash') buildDeck();
  if(t.dataset.tab==='contacts') renderContacts(document.getElementById('contactSearch').value);
}));

/* ---------------- REFERENCE ---------------- */
let sortMode='num', posFilter='all';
(function(){
  const wrap=document.getElementById('filterChips');
  const mk=(key,label,color)=>{
    const b=document.createElement('button');
    b.className='chip'; b.dataset.filter=key; b.setAttribute('aria-pressed', key==='all'?'true':'false');
    b.innerHTML = color ? `<span class="dot" style="background:${color}"></span>${label}` : label;
    b.onclick=()=>{posFilter=key;wrap.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false'));renderRoster();};
    wrap.appendChild(b);
  };
  mk('all','All'); POS_ORDER.forEach(n=>mk(n,POS[n].abbr,POS[n].color)); mk('coach','Coaches','var(--staff)');
})();
document.getElementById('sortChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return; sortMode=b.dataset.sort;
  document.querySelectorAll('#sortChips .chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false')); renderRoster();
});

function playerCard(p){
  const par=parents(p);
  const parHtml = par.length
    ? `<div class="parents"><span class="pl">Parents</span><span>${par.map(x=>`<b>${x.first}</b>`).join(' &amp; ')}</span></div>`
    : `<div class="parents empty"><span class="pl">Parents</span><span>—</span></div>`;
  const numHtml = p.num!=null ? `<div class="num">${p.num}</div>` : `<div class="num tbd">—</div>`;
  const badge = (!goingOnly && p.going) ? `<span class="going-badge" title="Going to the Grand Prix">🏁</span>` : '';
  return `<div class="card" style="border-top-color:${primaryColor(p)}">
      ${badge}<div class="name">${fullName(p)}</div>${numHtml}
      <div class="pos-row">${posChips(p)}</div>${parHtml}</div>`;
}
function coachCard(p){
  const badge = (!goingOnly && p.going) ? `<span class="going-badge" title="Going to the Grand Prix">🏁</span>` : '';
  return `<div class="card coach">${badge}<div class="name">${fullName(p)}</div><span class="role">${p.pos[0]}</span></div>`;
}
function renderRoster(){
  const area=document.getElementById('rosterArea'); let html='';
  if(posFilter==='coach'){
    const c=scopedCoaches();
    html += `<div class="section-title">Coaching Staff</div>`;
    html += c.length ? `<div class="grid">${c.map(coachCard).join('')}</div>` : `<div class="empty-note">No staff in this view.</div>`;
    area.innerHTML=html; return;
  }
  let list = scopedPlayers();
  if(posFilter!=='all') list=list.filter(p=>p.pos.includes(posFilter));
  if(sortMode==='num') list.sort((a,b)=>{if(a.num==null&&b.num==null)return a.first.localeCompare(b.first);if(a.num==null)return 1;if(b.num==null)return -1;return a.num-b.num;});
  else if(sortMode==='name') list.sort((a,b)=>a.first.localeCompare(b.first)||a.last.localeCompare(b.last));
  else if(sortMode==='pos') list.sort((a,b)=>{const d=(POS_ORDER.indexOf(a.pos[0])+ (a.pos.length?0:99))-(POS_ORDER.indexOf(b.pos[0])+(b.pos.length?0:99));if(d!==0)return d;if(a.num==null&&b.num==null)return a.first.localeCompare(b.first);if(a.num==null)return 1;if(b.num==null)return -1;return a.num-b.num;});

  html += list.length ? `<div class="grid">${list.map(playerCard).join('')}</div>` : `<div class="empty-note">No players match this view.</div>`;
  if(posFilter==='all'){
    const c=scopedCoaches();
    if(c.length){ html += `<div class="section-title">Coaching Staff</div><div class="grid">${c.map(coachCard).join('')}</div>`; }
  }
  area.innerHTML=html;
}

/* ---------------- FLASHCARDS ---------------- */
let flashMode='numname', flashDir='num2name', deck=[], deckPos=0, flipped=false, tally={got:0,miss:0};
document.getElementById('flashMode').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return; flashMode=b.dataset.mode;
  document.querySelectorAll('#flashMode .chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false'));
  document.getElementById('dirGroup').style.display = flashMode==='numname'?'':'none'; buildDeck();
});
document.getElementById('flashDir').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return; flashDir=b.dataset.dir;
  document.querySelectorAll('#flashDir .chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false')); buildDeck();
});
function buildDeck(){
  let base;
  if(flashMode==='numname') base=numberedScoped();
  else if(flashMode==='pos') base=scopedPlayers().filter(p=>p.pos.length>0);
  else base=scopedPlayers().filter(p=>parents(p).length>0);
  deck=shuffle(base); deckPos=0; flipped=false; tally={got:0,miss:0}; renderFlash();
}
function cardFaces(p){
  if(flashMode==='numname'){
    let dir=flashDir; if(dir==='mix') dir=Math.random()<.5?'num2name':'name2num';
    if(dir==='num2name') return {fEye:'Who wears',fBig:'#'+p.num,bEye:'Player',bHtml:`<div class="big small">${fullName(p)}</div><div class="pos-row">${posChips(p)}</div>`};
    return {fEye:'Jersey number',fBig:fullName(p),fBigSmall:true,bEye:'Number',bHtml:`<div class="big">#${p.num}</div><div class="pos-row">${posChips(p)}</div>`};
  }
  if(flashMode==='pos') return {fEye:'Position',fBig:fullName(p),fBigSmall:true,bEye:'Plays',
    bHtml:`<div class="pos-row" style="transform:scale(1.25);margin:6px 0 4px;">${posChips(p)}</div><div class="answer-line">${posLabel(p)}</div>`};
  const lines=parents(p).map(x=>`<div class="answer-line"><span class="lab">${x.lab}</span>${x.first}</div>`).join('');
  return {fEye:'Parents of',fBig:fullName(p),fBigSmall:true,bEye:realName(p)+"'s parents",bHtml:lines};
}
function renderFlash(){
  const stage=document.getElementById('flashStage');
  if(!deck.length){stage.innerHTML=`<div class="empty-note">No cards for this drill in the current view.</div>`;return;}
  if(deckPos>=deck.length){
    const tot=tally.got+tally.miss, pct=tot?Math.round(tally.got/tot*100):0;
    stage.innerHTML=`<div class="results"><div class="headline">Deck Complete</div><div class="pct">${pct}%</div>
      <div class="blurb">${tally.got} nailed · ${tally.miss} to review</div>
      <div class="actions" style="margin-top:18px;"><button class="btn primary" id="redo">Shuffle &amp; restart</button></div></div>`;
    document.getElementById('redo').onclick=buildDeck; return;
  }
  const p=deck[deckPos];
  if(!p._faces||flashDir==='mix') p._faces=cardFaces(p);
  const f=p._faces, frontCls=f.fBigSmall?'big small':'big';
  stage.innerHTML=`
    <button class="flash ${flipped?'flipped':''}" id="flashCard" aria-label="Flashcard, tap to flip">
      <div class="flash-inner">
        <div class="face front"><div class="eyebrow">${f.fEye}</div><div class="${frontCls}">${f.fBig}</div><div class="flip-hint">Tap / Space to flip</div></div>
        <div class="face back"><div class="eyebrow">${f.bEye}</div>${f.bHtml}</div>
      </div>
    </button>
    <div class="deck-bar"><span class="deck-progress">${deckPos+1} / ${deck.length}</span>
      <span class="deck-tally"><span class="got">✓ ${tally.got}</span><span class="miss">✗ ${tally.miss}</span></span></div>
    <div class="track"><span style="width:${deckPos/deck.length*100}%"></span></div>
    <div class="actions" id="flashActions">
      ${flipped?`<button class="btn miss" data-act="miss">Missed it</button><button class="btn good" data-act="got">Got it</button>`
                :`<button class="btn primary" data-act="flip">Flip card</button>`}
    </div>
    <div class="btn-row-sub"><button class="btn ghost tiny" id="reshuffle">Restart deck</button></div>`;
  document.getElementById('flashCard').onclick=doFlip;
  document.getElementById('reshuffle').onclick=buildDeck;
  document.getElementById('flashActions').addEventListener('click',e=>{
    const b=e.target.closest('[data-act]'); if(!b)return;
    if(b.dataset.act==='flip') doFlip(); else mark(b.dataset.act==='got');
  });
}
function doFlip(){flipped=!flipped;renderFlash();}
function mark(g){if(g)tally.got++;else tally.miss++;deckPos++;flipped=false;renderFlash();}

/* ---------------- QUIZ ---------------- */
let quizSet='numbers', quizLen='10', questions=[], qIndex=0, qScore=0, qStreak=0, qBest=0, misses=[], answered=false;
document.getElementById('quizSet').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;quizSet=b.dataset.set;
  document.querySelectorAll('#quizSet .chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false'));});
document.getElementById('quizLen').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;quizLen=b.dataset.len;
  document.querySelectorAll('#quizLen .chip').forEach(c=>c.setAttribute('aria-pressed',c===b?'true':'false'));});
document.getElementById('startQuiz').onclick=startQuiz;

function resetQuiz(){
  questions=[]; qIndex=0;
  document.getElementById('quizSetup').style.display='';
  document.getElementById('startQuiz').style.display='';
  document.getElementById('quizStage').innerHTML='';
}
function genNumberQ(){
  const pool=numberedScoped(); const p=pool[Math.floor(Math.random()*pool.length)];
  if(Math.random()<.5){ const d=sample(pool.map(fullName),3,fullName(p));
    return {type:'Numbers',qHtml:`Who wears <span class="qnum">#${p.num}</span>?`,correct:fullName(p),options:shuffle([fullName(p),...d])};}
  const d=sample(pool.map(x=>'#'+x.num),3,'#'+p.num);
  return {type:'Numbers',qHtml:`What number does <b>${fullName(p)}</b> wear?`,correct:'#'+p.num,options:shuffle(['#'+p.num,...d])};
}
function genPositionQ(){
  const pool=scopedPlayers().filter(p=>p.pos.length>0); const p=pool[Math.floor(Math.random()*pool.length)];
  const combos=[...new Set(pool.map(posLabel))]; const d=sample(combos,3,posLabel(p));
  return {type:'Positions',qHtml:`What position does <b>${fullName(p)}</b> play?`,correct:posLabel(p),options:shuffle([posLabel(p),...d])};
}
function genParentsQ(){
  const pool=scopedPlayers().filter(p=>parents(p).length>0); const p=pool[Math.floor(Math.random()*pool.length)];
  const lab=x=>parents(x).map(z=>z.first).join(' & '); const d=sample(pool.map(lab),3,lab(p));
  return {type:'Parents',qHtml:`Who are <b>${fullName(p)}</b>'s parents?`,correct:lab(p),options:shuffle([lab(p),...d])};
}
function genOne(){let s=quizSet;if(s==='mixed')s=['numbers','positions','parents'][Math.floor(Math.random()*3)];
  return s==='numbers'?genNumberQ():s==='positions'?genPositionQ():genParentsQ();}
function startQuiz(){
  const np=numberedScoped().length, pp=scopedPlayers().filter(p=>p.pos.length).length, pa=scopedPlayers().filter(p=>parents(p).length).length;
  let n; if(quizLen==='all') n = quizSet==='numbers'?np*2 : quizSet==='positions'?pp : quizSet==='parents'?pa : np+pp; else n=parseInt(quizLen,10);
  if(!np && (quizSet==='numbers')){ document.getElementById('quizStage').innerHTML=`<div class="empty-note">No numbered players in this view.</div>`; return; }
  questions=[]; const seen=new Set(); let guard=0;
  while(questions.length<n && guard<n*40){guard++;const q=genOne();const k=q.type+'|'+q.qHtml+'|'+q.correct;if(seen.has(k))continue;seen.add(k);questions.push(q);}
  qIndex=0;qScore=0;qStreak=0;qBest=0;misses=[];answered=false;
  document.getElementById('quizSetup').style.display='none'; document.getElementById('startQuiz').style.display='none'; renderQuiz();
}
function renderQuiz(){
  const stage=document.getElementById('quizStage');
  if(qIndex>=questions.length){renderQuizResults();return;}
  const q=questions[qIndex];
  stage.innerHTML=`
    <div class="scoreboard">
      <div class="score-cell"><div class="v accent">${qIndex+1}<span style="font-size:16px;opacity:.6">/${questions.length}</span></div><div class="k">Question</div></div>
      <div class="score-cell"><div class="v">${qScore}</div><div class="k">Correct</div></div>
      <div class="score-cell"><div class="v">${qStreak}</div><div class="k">Streak</div></div></div>
    <div class="question"><div class="qtype">${q.type}</div><div class="q">${q.qHtml}</div>
      <div class="options" id="opts">${q.options.map((o,i)=>`<button class="opt" data-i="${i}" data-val="${(''+o).replace(/"/g,'&quot;')}"><span class="key">${i+1}</span><span>${o}</span></button>`).join('')}</div></div>
    <div class="q-foot" id="qFoot"></div>`;
  answered=false;
  document.getElementById('opts').addEventListener('click',e=>{const b=e.target.closest('.opt');if(!b||answered)return;pickAnswer(b.dataset.val,q);});
}
function pickAnswer(val,q){
  answered=true; const ok=val===q.correct;
  if(ok){qScore++;qStreak++;qBest=Math.max(qBest,qStreak);} else {qStreak=0;misses.push(q);}
  document.querySelectorAll('#opts .opt').forEach(b=>{b.disabled=true;
    if(b.dataset.val===q.correct)b.classList.add('correct'); else if(b.dataset.val===val)b.classList.add('wrong'); else b.classList.add('dim');});
  const foot=document.getElementById('qFoot');
  foot.innerHTML=`<button class="btn primary" id="nextQ">${qIndex+1>=questions.length?'See results':'Next →'}</button>`;
  document.getElementById('nextQ').onclick=()=>{qIndex++;renderQuiz();}; document.getElementById('nextQ').focus();
}
function renderQuizResults(){
  const stage=document.getElementById('quizStage'); const pct=questions.length?Math.round(qScore/questions.length*100):0;
  let blurb = pct===100?'Perfect — you know this roster cold.':pct>=80?'Strong. A couple of names left to lock in.':pct>=50?'Getting there — run the misses again.':'Early days. Flashcards, then come back.';
  const missHtml = misses.length?`<div class="miss-list"><div class="mhead">Review these (${misses.length})</div>
      ${misses.map(m=>`<div class="miss-item"><div class="mq">${m.qHtml.replace(/<[^>]+>/g,'')}</div><div class="ma">${m.correct}</div></div>`).join('')}</div>`
    :`<div class="blurb" style="margin-top:14px;color:var(--good)">Clean sweep — no misses.</div>`;
  stage.innerHTML=`<div class="results"><div class="headline">Final</div><div class="pct">${pct}%</div>
    <div class="blurb">${qScore} / ${questions.length} correct · best streak ${qBest}</div>
    <div class="blurb" style="color:var(--muted);font-size:14px;">${blurb}</div>${missHtml}
    <div class="actions" style="margin-top:24px;"><button class="btn primary" id="again">Play again</button>
      <button class="btn ghost" id="changeSet">Change set</button></div></div>`;
  document.getElementById('again').onclick=startQuiz;
  document.getElementById('changeSet').onclick=resetQuiz;
}

/* ---------------- CONTACTS ---------------- */
function metaLinks(email,phone){
  let h='';
  if(email) h+=`<a href="mailto:${email}"><span class="ic">✉</span>${email}</a>`;
  if(phone) h+=`<a href="tel:${telHref(phone)}"><span class="ic">☎</span>${fmtPhone(phone)}</a>`;
  return h || `<span class="cnone">No contact on file</span>`;
}
function contactCardPlayer(p){
  const par=parents(p);
  const numPos = [p.num!=null?'#'+p.num:null, p.pos.length?posLabel(p):null].filter(Boolean).join(' · ');
  const ppl = par.length ? par.map(x=>`<div class="cperson"><div class="crole">${x.lab}</div><div class="cname">${x.name}</div><div class="cmeta">${metaLinks(x.email,x.phone)}</div></div>`).join('')
                         : `<div class="cperson"><span class="cnone">No parent contact on file</span></div>`;
  return `<div class="contact-card" style="border-top-color:${primaryColor(p)}">
      <div class="contact-head"><span class="cn">${realName(p)}</span><span class="cnum">${numPos||'—'}</span></div>${ppl}</div>`;
}
function contactCardCoach(p){
  const c=p.contact||{};
  return `<div class="contact-card coach">
      <div class="contact-head"><span class="cn">${realName(p)}</span><span class="cnum">${p.pos[0]}</span></div>
      <div class="cmeta">${metaLinks(c.email,c.phone)}</div></div>`;
}
function renderContacts(term){
  term=(term||'').trim().toLowerCase();
  const match=(p)=>{
    if(!term) return true;
    const hay=[realName(p), p.pos.join(' '),
      ...(p.tag==='Player'?parents(p).map(x=>x.name):[]) ].join(' ').toLowerCase();
    return hay.includes(term);
  };
  const ps=scopedPlayers().filter(match).sort((a,b)=>a.first.localeCompare(b.first));
  const cs=scopedCoaches().filter(match).sort((a,b)=>a.last.localeCompare(b.last));
  const area=document.getElementById('contactsArea'); let html='';
  html += `<div class="section-title">Players${term?` · ${ps.length} match`:''}</div>`;
  html += ps.length ? `<div class="cgrid">${ps.map(contactCardPlayer).join('')}</div>` : `<div class="empty-note">No players match.</div>`;
  html += `<div class="section-title">Coaching Staff</div>`;
  html += cs.length ? `<div class="cgrid">${cs.map(contactCardCoach).join('')}</div>` : `<div class="empty-note">No staff match.</div>`;
  area.innerHTML=html;
}
document.getElementById('contactSearch').addEventListener('input',e=>renderContacts(e.target.value));

/* ---------------- KEYBOARD ---------------- */
document.addEventListener('keydown',e=>{
  const flashVis=!document.getElementById('view-flash').classList.contains('hidden');
  const quizVis=!document.getElementById('view-quiz').classList.contains('hidden');
  if(flashVis && deck.length && deckPos<deck.length){
    if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(!flipped)doFlip();else mark(true);}
    else if(flipped&&(e.key==='ArrowRight'||e.key==='1')){e.preventDefault();mark(true);}
    else if(flipped&&(e.key==='ArrowLeft'||e.key==='2')){e.preventDefault();mark(false);}
  }
  if(quizVis && questions.length && qIndex<questions.length){
    const opts=document.querySelectorAll('#opts .opt');
    if(!answered && /^[1-4]$/.test(e.key)){const i=parseInt(e.key,10)-1;if(opts[i])opts[i].click();}
    else if(answered&&(e.key==='Enter'||e.key==='ArrowRight')){const n=document.getElementById('nextQ');if(n)n.click();}
  }
});

/* ---------------- INIT ---------------- */
updateHeader();
renderRoster();
</script>
